name: fluenta
description: AI-Powered English Fluency App

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.3.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # UI / Fonts
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  flutter_markdown: ^0.7.1
  fl_chart: ^0.67.0

  # Skills
  speech_to_text: ^7.3.0
  flutter_tts: ^4.0.2
  record: ^6.2.0
  just_audio: ^0.9.39
  youtube_player_flutter: ^9.1.0

  # Navigation
  go_router: ^14.0.0

  # Utilities
  flutter_dotenv: ^5.1.0
  dio: ^5.4.3+1
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  path_provider: ^2.1.3
  connectivity_plus: ^6.0.3
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
